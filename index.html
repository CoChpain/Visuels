<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur Visuels Basket</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">BC</div>
      <div class="brand-text">
        <span class="brand-name">Basket Club</span>
        <span class="brand-sub">Visual Builder</span>
      </div>
    </div>
    <div class="format-tabs">
      <button data-format="instagram" class="active">Instagram</button>
      <button data-format="story">Story</button>
      <button data-format="a3">A3</button>
    </div>
  </header>

  <main class="layout">
    <section class="controls-panel">
      <h2>Paramètres du visuel</h2>

      <label class="field">
        <span>Modèle</span>
        <select id="templateSelect">
          <option value="resultats">Résultats</option>
          <option value="programme">Programme</option>
          <option value="nm2">NM2</option>
          <option value="info">Info</option>
        </select>
      </label>

      <label class="field">
        <span>Titre (ligne 1)</span>
        <input type="text" id="titleInput" placeholder="EX : VICTOIRE À DOMICILE">
      </label>

      <label class="field">
        <span>Sous-titre (ligne 2)</span>
        <input type="text" id="subtitleInput" placeholder="EX : BC LA ROCHE 78 - 65 NANTES">
      </label>

      <label class="field">
        <span>Image de fond</span>
        <input type="file" id="imageInput" accept="image/*">
        <small>Glisse pour déplacer, molette / pinch pour zoomer</small>
      </label>

      <div class="actions">
        <button id="btn-generate">Mettre à jour</button>
        <button id="btn-download" class="primary">Télécharger</button>
      </div>
    </section>

    <section class="preview-panel">
      <div class="preview-frame">
        <canvas id="canvas"></canvas>
      </div>
      <p class="hint">Aperçu temps réel — le rendu final sera en haute résolution.</p>
    </section>
  </main>

  
  <script src="js/app.js"></script>
</body>
</html>
