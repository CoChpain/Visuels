<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur Visuels</title>

  <link rel="stylesheet" href="instagram.css" id="theme-style">

  <!-- Police moderne -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .tabs button {
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: #222;
      color: white;
      border-radius: 5px;
    }

    .controls {
      margin: 20px 0;
    }

    .controls select,
    .controls input[type="text"],
    .controls input[type="file"],
    .controls button {
      margin: 5px;
    }

    canvas {
      border: 1px solid #666;
      width: 360px;
      height: 450px;
      background: white;
      touch-action: none; /* pour le pinch sur mobile */
    }
  </style>
</head>
<body>

  <div class="tabs">
    <button onclick="switchTab('instagram', 'instagram.css')">Instagram</button>
    <button onclick="switchTab('a3', 'a3.css')">A3</button>
    <button onclick="switchTab('story', 'story.css')">Story</button>
  </div>

  <div class="controls">
    <select id="templateSelect">
      <option value="resultats">Résultats</option>
      <option value="programme">Programme</option>
      <option value="nm2">NM2</option>
      <option value="info">Info</option>
    </select>
    <br>

    <input type="text" id="titleInput" placeholder="Titre (ligne 1)">
    <input type="text" id="subtitleInput" placeholder="Sous‑titre (ligne 2)">
    <br>

    <input type="file" id="imageInput" accept="image/*">
    <br>

    <button onclick="generate()">Générer</button>
    <button onclick="download()">Télécharger</button>
  </div>

  <canvas id="canvas"></canvas>

  <script src="js/app.js"></script>
</body>
</html>
